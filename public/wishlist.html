<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shai &amp; Co. — Wishlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="site-header" id="site-header"></header>

<main class="container" style="padding-top:40px;">
  <h1 class="page-title">Your wishlist</h1>
  <p class="page-subtitle">Saved pieces, kept for later.</p>
  <div class="product-grid" id="wishlist-grid"><p>Loading...</p></div>
</main>

<footer class="site-footer">
  <div class="brand-word">Shai <span class="veil-dot">&amp;</span> Co.</div>
  A demo storefront built for the CodeAlpha Full Stack internship.
</footer>

<script src="/js/app.js"></script>
<script>
function renderStars(rating) {
  return `<span class="stars">${starString(rating)}</span> <span>${(Number(rating) || 0).toFixed(1)}</span>`;
}

async function loadWishlist() {
  const user = await requireAuth();
  if (!user) return;

  const grid = document.getElementById('wishlist-grid');
  try {
    const { products } = await api('/wishlist');
    if (products.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="big-icon">&#9825;</div><p>Nothing saved yet.</p><a href="/index.html" class="btn btn-primary">Browse the collection</a></div>`;
      return;
    }
    grid.innerHTML = products.map((p, i) => `
      <div class="product-card" style="animation-delay:${i * 0.06}s">
        <a href="/product.html?id=${p.id}" style="display:contents;">
          <div class="thumb">
            <div class="veil-scrim"></div>
            <img class="base" src="${p.image}" alt="${escapeHtml(p.name)}" loading="lazy">
            <img class="hover-img" src="${p.hoverImage || p.image}" alt="" loading="lazy">
          </div>
        </a>
        <button class="wishlist-btn active" onclick="event.stopPropagation(); removeFromWishlistPage('${p.id}', this)" aria-label="Remove from wishlist">&#9829;</button>
        <button class="quick-add-btn" onclick="addToCart('${p.id}', 1)" ${p.stock === 0 ? 'disabled' : ''}>${p.stock === 0 ? 'Out of stock' : 'Quick add'}</button>
        <a href="/product.html?id=${p.id}" class="body">
          <span class="category-tag">${escapeHtml(p.category)}</span>
          <span class="name">${escapeHtml(p.name)}</span>
          <span class="rating-row">${renderStars(p.rating)} <span style="opacity:0.6">(${p.reviewCount})</span></span>
          <div class="price-row"><span class="price">${formatMoney(p.price)}</span></div>
        </a>
      </div>
    `).join('');
  } catch (err) {
    grid.innerHTML = `<p>${escapeHtml(err.message)}</p>`;
  }
}

async function removeFromWishlistPage(productId, btnEl) {
  const card = btnEl.closest('.product-card');
  await toggleWishlist(productId, btnEl);
  card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
  card.style.opacity = '0';
  card.style.transform = 'translateY(8px)';
  setTimeout(() => card.remove(), 300);
}

loadWishlist();
</script>
</body>
</html>
