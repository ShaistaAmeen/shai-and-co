<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shai &amp; Co. — Sign Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="site-header" id="site-header"></header>

<div class="auth-split">
  <div class="auth-visual">
    <img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=900" alt="">
    <div class="auth-visual-text">
      <div class="brand-word">Shai <span class="veil-dot">&amp;</span> Co.</div>
      <p>Create an account to save your bag, build a wishlist, and track your orders.</p>
    </div>
  </div>
  <div class="auth-form-side">
    <div class="form-panel">
      <h2>Create your account</h2>
      <div class="sub">Takes about fifteen seconds.</div>
      <div id="msg"></div>
      <form onsubmit="handleRegisterSubmit(event)">
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Sign up</button>
      </form>
      <p class="form-footer-link">Already have an account? <a href="/login.html">Log in</a></p>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
async function handleRegisterSubmit(e) {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submit-btn');
  msg.innerHTML = '';
  btn.disabled = true;
  btn.textContent = 'Creating account...';
  try {
    await api('/auth/register', { method: 'POST', body: { name, email, password } });
    window.location.href = '/index.html';
  } catch (err) {
    msg.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
    btn.disabled = false;
    btn.textContent = 'Sign up';
  }
}
</script>
</body>
</html>
