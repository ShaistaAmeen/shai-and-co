<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shai &amp; Co. — My Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="site-header" id="site-header"></header>

<main class="container" style="padding-top:40px;">
  <h1 class="page-title">My orders</h1>
  <div id="content"><p>Loading orders...</p></div>
</main>

<footer class="site-footer">
  <div class="brand-word">Shai <span class="veil-dot">&amp;</span> Co.</div>
  A demo storefront built for the CodeAlpha Full Stack internship.
</footer>

<script src="/js/app.js"></script>
<script>
async function loadOrders() {
  const user = await requireAuth();
  if (!user) return;

  const content = document.getElementById('content');
  try {
    const { orders } = await api('/orders');
    if (orders.length === 0) {
      content.innerHTML = `<div class="empty-state"><div class="big-icon">&#9679;</div><p>You haven't placed any orders yet.</p><a href="/index.html" class="btn btn-primary">Browse the collection</a></div>`;
      return;
    }
    content.innerHTML = orders.map((order, i) => `
      <div class="order-card" style="animation-delay:${i * 0.06}s; opacity:0; animation:cardRise 0.4s var(--ease) forwards;">
        <div class="order-card-header">
          <div class="order-id">Order #${order.id.slice(0, 8)} &middot; ${new Date(order.createdAt).toLocaleDateString()}</div>
          <span class="order-status">${escapeHtml(order.status)}</span>
        </div>
        ${order.items.map(i => `<div class="order-item-row"><span>${escapeHtml(i.name)} &times; ${i.quantity}</span><span>${formatMoney(i.subtotal)}</span></div>`).join('')}
        <div class="order-item-row" style="font-weight:700; color:var(--text-on-bone); border-top:1px solid var(--bone-dim); margin-top:8px; padding-top:8px;">
          <span>Total</span><span>${formatMoney(order.total)}</span>
        </div>
      </div>
    `).join('');
  } catch (err) {
    content.innerHTML = `<p>${escapeHtml(err.message)}</p>`;
  }
}

loadOrders();
</script>
</body>
</html>
